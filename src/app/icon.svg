<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220" />
      <stop offset="100%" stop-color="#1f2a44" />
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)" />

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accent)" stroke-width="18" opacity="0.7" />

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3" />

  <!-- Decorative corner dots -->
  <circle cx="256" cy="60" r="7" fill="url(#accent)" filter="url(#softglow)" />
  <circle cx="256" cy="452" r="7" fill="url(#accent)" filter="url(#softglow)" />
  <circle cx="60" cy="256" r="7" fill="url(#accent)" filter="url(#softglow)" />
  <circle cx="452" cy="256" r="7" fill="url(#accent)" filter="url(#softglow)" />

  <!-- Top line accent -->
  <line x1="100" y1="128" x2="412" y2="128" stroke="url(#accent2)" stroke-width="2" opacity="0.6" />
  <!-- Bottom line accent -->
  <line x1="100" y1="384" x2="412" y2="384" stroke="url(#accent2)" stroke-width="2" opacity="0.6" />

  <!-- MUMOIRA text -->
  <text
    x="256"
    y="258"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="82"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#fef3c7"
    letter-spacing="3"
    filter="url(#softglow)"
  >MUMOIRA</text>

  <!-- Separator dot -->
  <circle cx="256" cy="288" r="4" fill="url(#accent)" />

  <!-- ID.VN text -->
  <text
    x="256"
    y="322"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="url(#accent)"
    letter-spacing="6"
  >.ID.VN</text>

  <!-- Glowing dot bottom-right -->
  <circle cx="390" cy="390" r="24" fill="url(#accent)" filter="url(#glow)" opacity="0.9" />
  <circle cx="390" cy="390" r="10" fill="#fef3c7" opacity="0.8" />
</svg>
